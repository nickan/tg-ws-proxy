name: Build & Release (aarch64-musl)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: tg-ws-proxy-aarch64-musl

jobs:
  build:
    name: Cross-compile aarch64-unknown-linux-musl
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed for release creation

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: aarch64-musl-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: aarch64-musl-

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross --locked

      - name: Build release binary
        run: cross build --release --target aarch64-unknown-linux-musl

      - name: Rename & verify binary
        run: |
          cp target/aarch64-unknown-linux-musl/release/tg-ws-proxy "${{ env.BINARY_NAME }}"
          ls -lh "${{ env.BINARY_NAME }}"
          file "${{ env.BINARY_NAME }}"
          # Verify it's an ELF aarch64 binary
          readelf -h "${{ env.BINARY_NAME }}" | grep -E "Machine|Type"

      - name: Create GitHub Release and upload binary
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.BINARY_NAME }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
